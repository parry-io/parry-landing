name: Security Scan

# SOC2 vulnerability-management + supply-chain controls (36 / CC7.1) for
# parry-landing (marketing site), matching the other repos: secret detection
# and an npm dependency/config vulnerability scan on every PR + push.

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  secret-detection:
    name: Secret Detection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ github.token }}

  dependency-scan:
    name: Dependency Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Trivy filesystem scan (npm deps + config)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '1'
