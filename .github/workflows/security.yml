name: Security Scan

# SOC2 vulnerability-management + supply-chain controls (36 / CC7.1) for
# parry-landing (marketing site), matching the parry-core bar: secret detection + a filesystem
# vulnerability scan on every PR + push.

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  secret-detection:
    name: Secret Detection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      # Install the gitleaks BINARY directly — the gitleaks-action@v2 requires a
      # paid GITLEAKS_LICENSE for organizations; the binary is license-free.
      - name: Install gitleaks
        run: curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz | tar xz -C /usr/local/bin gitleaks
      - name: Run gitleaks
        run: gitleaks detect --source . --verbose --redact

  dependency-scan:
    name: Dependency Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Trivy filesystem scan (deps + config)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: '.'
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '0'  # advisory on first introduction; tighten to '1' once the dep baseline is clean
